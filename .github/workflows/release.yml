name: Build/release Marktext

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: false
        default: '1.3.0'

jobs:
  # Quality checks before building
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts

      - name: Run Linting
        run: npm run lint

      - name: Run Format Check
        run: npm run format:check

  # Build for all platforms
  build:
    needs: lint
    runs-on: ${{ matrix.os }}
    # Mac signing/notarization needs Apple secrets; don't let a Mac failure
    # block the Windows and Linux release
    continue-on-error: ${{ matrix.platform == 'mac' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
          # windows-latest ships Visual Studio 2026, which node-gyp cannot
          # detect yet; pin to the VS 2022 image
          - os: windows-2022
            platform: windows
          - os: macos-latest
            platform: mac

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v5

      - name: Install python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Linux Build Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            icnsutils \
            graphicsmagick \
            xz-utils \
            libx11-dev \
            libxkbfile-dev \
            gnome-keyring \
            libsecret-1-dev \
            libfontconfig-dev \
            rpm

      # Install dependencies without running postinstall scripts (we rebuild manually)
      - name: Install Dependencies
        run: npm ci --no-audit --no-fund --ignore-scripts --loglevel verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Electron requires C++20 support for native modules (Electron 33+)
      - name: Set C++20 for MacOS
        if: matrix.platform == 'mac'
        run: |
          echo "CXXFLAGS=-std=gnu++20 -stdlib=libc++" >> $GITHUB_ENV

      - name: Rebuild native modules for Electron (MacOS + Windows)
        if: matrix.platform != 'linux'
        run: npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Use gcc/g++ on Linux for electron-rebuild instead of clang
      - name: Rebuild native modules for Electron (Linux)
        if: matrix.platform == 'linux'
        run: USE_ELECTRON_CLANG=0 npx @electron/rebuild -f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Build for Linux
      - name: Build Linux
        if: matrix.platform == 'linux'
        run: npm run build:linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Passing an empty CSC_LINK makes electron-builder try to load a
      # certificate from an empty path, so detect the secrets first
      - name: Check for Mac signing secrets
        if: matrix.platform == 'mac'
        run: echo "HAS_MAC_CERTS=${{ secrets.MAC_CERTS != '' }}" >> $GITHUB_ENV

      # Build for Mac with code signing and notarization
      # Requires: APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID secrets
      - name: Build Mac
        if: matrix.platform == 'mac' && env.HAS_MAC_CERTS == 'true'
        run: npm run build:mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          # Notarization (can be slow - up to 30 minutes)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Without signing secrets, ship an unsigned build; users bypass
      # Gatekeeper with: xattr -cr /Applications/MarkText.app
      - name: Build Mac (unsigned)
        if: matrix.platform == 'mac' && env.HAS_MAC_CERTS != 'true'
        run: npm run minify-locales && npx @electron/rebuild && npm run build && npx electron-builder --mac --publish never -c.mac.notarize=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # Build for Windows
      - name: Build Windows
        if: matrix.platform == 'windows'
        run: npm run build:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload build artifacts
      - name: Upload Linux Artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/latest*.yml
          if-no-files-found: error

      - name: Upload Mac Artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v6
        with:
          name: mac-builds
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

      - name: Upload Windows Artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v6
        with:
          name: windows-builds
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  # Create GitHub Release with all artifacts
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.snap" -o -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.blockmap" -o -name "latest*.yml" \) -exec cp {} release-files/ \;

          # Stable-named copies so /releases/latest/download/<name> is a
          # permanent URL that always serves the newest build
          cd release-files
          for f in marktext-win-x64-*-setup.exe; do [ -e "$f" ] && cp "$f" marktext-win-setup.exe; done
          for f in marktext-win-x64-*.zip; do [ -e "$f" ] && cp "$f" marktext-win-portable.zip; done
          for f in marktext-mac-arm64-*.dmg; do [ -e "$f" ] && cp "$f" marktext-mac-arm64.dmg; done
          for f in marktext-mac-x64-*.dmg; do [ -e "$f" ] && cp "$f" marktext-mac-intel.dmg; done
          for f in marktext-linux-*.AppImage; do [ -e "$f" ] && cp "$f" marktext-linux.AppImage; done
          ls -la

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.event.inputs.version) }}"
          cat << 'EOF' > release-notes.md
          ## MarkText $VERSION

          ### Always-latest links (bookmark these — they always serve the newest release)

          - Windows installer: https://github.com/conjoyco/marktextpp/releases/latest/download/marktext-win-setup.exe
          - Windows portable: https://github.com/conjoyco/marktextpp/releases/latest/download/marktext-win-portable.zip
          - Mac (Apple Silicon): https://github.com/conjoyco/marktextpp/releases/latest/download/marktext-mac-arm64.dmg
          - Mac (Intel): https://github.com/conjoyco/marktextpp/releases/latest/download/marktext-mac-intel.dmg
          - Linux AppImage: https://github.com/conjoyco/marktextpp/releases/latest/download/marktext-linux.AppImage

          ### Downloads

          #### macOS
          - **Apple Silicon (M1/M2/M3)**: `marktext-mac-arm64-*.dmg`
          - **Intel**: `marktext-mac-x64-*.dmg`

          #### Windows
          - **Installer**: `marktext-win-x64-*-setup.exe`
          - **Portable**: `marktext-win-x64-*.zip`

          #### Linux
          - **AppImage** (universal): `marktext-linux-*.AppImage`
          - **Debian/Ubuntu**: `marktext-linux-*.deb`
          - **Fedora/RHEL**: `marktext-linux-*.rpm`
          - **Snap**: `marktext-linux-*.snap`
          - **Arch/Manual**: `marktext-linux-*.tar.gz`

          ### Notes for macOS Users
          If you encounter "`MarkText is damaged and can't be opened`" error:
          ```bash
          xattr -cr /Applications/MarkText.app
          ```

          ### Notes for Arch Linux Users
          Extract the tar.gz and run `marktext` from the extracted directory, or create a PKGBUILD.
          EOF
          sed -i "s/[$]VERSION/${VERSION}/g" release-notes.md
          echo "notes_file=release-notes.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          # On manual dispatch there is no pushed tag, so create it here at
          # the commit the workflow ran on
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.event.inputs.version) }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
