<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Updater</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #2b2b2b;
        --panel: #1f1f1f;
        --fg: #e8e8e8;
        --muted: #9a9a9a;
        --accent: #2e8fff;
        --border: #3d3d3d;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        font-family:
          'Segoe UI',
          -apple-system,
          system-ui,
          sans-serif;
        background: var(--panel);
        color: var(--fg);
        font-size: 14px;
        user-select: none;
      }
      header {
        padding: 14px 18px;
        background: #f5f5f5;
        color: #222;
        font-size: 15px;
        border-bottom: 1px solid #d0d0d0;
      }
      @media (prefers-color-scheme: dark) {
        header {
          background: #333;
          color: var(--fg);
          border-bottom-color: var(--border);
        }
      }
      main {
        flex: 1;
        overflow-y: auto;
        background: var(--bg);
        padding: 26px 40px;
        user-select: text;
      }
      main h1.version {
        font-size: 30px;
        font-weight: 700;
        margin: 22px 0 12px;
      }
      main h1.version:first-child {
        margin-top: 0;
      }
      main h1,
      main h2,
      main h3 {
        margin: 16px 0 10px;
      }
      main ul,
      main ol {
        margin: 8px 0 8px 24px;
      }
      main li {
        margin: 6px 0;
        line-height: 1.5;
      }
      main p {
        margin: 8px 0;
        line-height: 1.5;
      }
      main a {
        color: var(--accent);
      }
      footer {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        background: #f5f5f5;
        border-top: 1px solid #d0d0d0;
        color: #222;
      }
      @media (prefers-color-scheme: dark) {
        footer {
          background: #333;
          color: var(--fg);
          border-top-color: var(--border);
        }
      }
      footer label {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-right: auto;
        cursor: pointer;
      }
      button {
        font: inherit;
        padding: 6px 14px;
        border: 1px solid #b5b5b5;
        border-radius: 3px;
        background: #e9e9e9;
        color: #222;
        cursor: pointer;
      }
      @media (prefers-color-scheme: dark) {
        button {
          background: #454545;
          color: var(--fg);
          border-color: #5a5a5a;
        }
      }
      button:hover {
        filter: brightness(1.08);
      }
      button.primary {
        border-color: var(--accent);
        outline: 1px solid var(--accent);
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
      #progress {
        display: none;
        height: 4px;
        background: var(--border);
      }
      #progress .bar {
        height: 100%;
        width: 0%;
        background: var(--accent);
        transition: width 0.2s;
      }
      #error {
        display: none;
        padding: 8px 18px;
        background: #5c2b2b;
        color: #ffb4b4;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header id="header">Checking version information…</header>
    <div id="error"></div>
    <main id="notes"></main>
    <div id="progress"><div class="bar" id="progress-bar"></div></div>
    <footer>
      <label>
        <input id="auto-check" type="checkbox" checked />
        Check updates automatically
      </label>
      <button id="skip">Skip This Version</button>
      <button id="later">Remind Me Later</button>
      <button id="download" class="primary">Download Update</button>
    </footer>
    <script>
      const { ipcRenderer } = require('electron')

      const $ = (id) => document.getElementById(id)
      let latestVersion = ''

      const setDownloadedState = () => {
        const btn = $('download')
        btn.disabled = false
        btn.textContent = 'Restart and Install'
        btn.onclick = () => ipcRenderer.send('mt::updater-install')
        $('progress').style.display = 'none'
        $('skip').style.display = 'none'
      }

      ipcRenderer.on('mt::updater-meta', (e, meta) => {
        latestVersion = meta.latestVersion
        $('header').textContent =
          'New version available. Latest version is ' +
          meta.latestVersion +
          ', your version is ' +
          meta.currentVersion
        $('auto-check').checked = !!meta.autoCheckUpdates

        const notes = $('notes')
        notes.innerHTML = ''
        for (const entry of meta.notes) {
          if (entry.version) {
            const h = document.createElement('h1')
            h.className = 'version'
            h.textContent = entry.version
            notes.appendChild(h)
          }
          const div = document.createElement('div')
          div.innerHTML = entry.note
          // The notes come from our own GitHub releases, but strip scripts anyway.
          div.querySelectorAll('script, iframe, object, embed').forEach((n) => n.remove())
          notes.appendChild(div)
        }
        if (!meta.notes.length) {
          const p = document.createElement('p')
          p.textContent = 'No release notes available.'
          notes.appendChild(p)
        }
        if (meta.downloaded) {
          setDownloadedState()
        }
      })

      ipcRenderer.on('mt::updater-progress', (e, p) => {
        $('progress').style.display = 'block'
        $('progress-bar').style.width = p.percent.toFixed(1) + '%'
        const btn = $('download')
        btn.disabled = true
        btn.textContent = 'Downloading… ' + p.percent.toFixed(0) + '%'
      })

      ipcRenderer.on('mt::updater-downloaded', setDownloadedState)

      ipcRenderer.on('mt::updater-error', (e, message) => {
        const el = $('error')
        el.style.display = 'block'
        el.textContent = message
        const btn = $('download')
        btn.disabled = false
        btn.textContent = 'Download Update'
      })

      $('download').onclick = () => {
        $('error').style.display = 'none'
        $('download').disabled = true
        ipcRenderer.send('mt::updater-download')
      }
      $('skip').onclick = () => ipcRenderer.send('mt::updater-skip', latestVersion)
      $('later').onclick = () => ipcRenderer.send('mt::updater-later')
      $('auto-check').onchange = (e) => ipcRenderer.send('mt::updater-auto-check', e.target.checked)

      // External links open in the default browser, not this window.
      document.addEventListener('click', (e) => {
        const a = e.target.closest('a[href]')
        if (a) {
          e.preventDefault()
          require('electron').shell.openExternal(a.href)
        }
      })
    </script>
  </body>
</html>
